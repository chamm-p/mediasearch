# mediasearch eigene mpv-Tastenbelegung.
# Wird via --input-conf=... beim Random-Video-Start uebergeben.
# Globale ~/.config/mpv/input.conf bleibt unangetastet.
#
# Rotation des laufenden Videos:
#   Alt+Rechts   90 Grad im Uhrzeigersinn
#   Alt+Links    90 Grad gegen Uhrzeigersinn
#   Alt+0        Rotation zuruecksetzen
Alt+RIGHT  cycle-values video-rotate "0" "90" "180" "270" ; show-text "Rotation: ${video-rotate}"
Alt+LEFT   cycle-values video-rotate "0" "270" "180" "90" ; show-text "Rotation: ${video-rotate}"
Alt+0      set video-rotate 0 ; show-text "Rotation zurueckgesetzt"
