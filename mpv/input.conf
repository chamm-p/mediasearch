# mediasearch eigene mpv-Tastenbelegung.
# Wird via --input-conf=... beim Random-Video-Start uebergeben.
# Globale ~/.config/mpv/input.conf bleibt unangetastet.
#
# TEST: F12 -> Bestaetigt dass diese Datei geladen wurde.
# Wenn F12 in mpv KEINEN Text zeigt, wird die Config nicht geladen.
F12 show-text "mediasearch input.conf aktiv" 3000
#
# Rotation des laufenden Videos (B/N - keine mpv-Defaults):
#   b   90 Grad im Uhrzeigersinn (cycle: 0 -> 90 -> 180 -> 270 -> 0)
#   n   90 Grad gegen Uhrzeigersinn
#   Shift+b  Rotation zuruecksetzen
b cycle-values video-rotate "0" "90" "180" "270"
n cycle-values video-rotate "0" "270" "180" "90"
B set video-rotate 0
