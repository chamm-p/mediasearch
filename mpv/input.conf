# mediasearch eigene mpv-Tastenbelegung.
# Wird via --input-conf=... beim Random-Video-Start uebergeben.
# Globale ~/.config/mpv/input.conf bleibt unangetastet.
#
# Rotation des laufenden Videos:
r          cycle-values video-rotate "0" "90" "180" "270"
R          cycle-values video-rotate "0" "270" "180" "90"
Ctrl+r     set video-rotate 0          ; show-text "Rotation zurueckgesetzt"

# Standard-Hotkeys, die in der Slideshow-Routine bei dir Sinn machen:
# (alles was mpv schon kennt, bleibt - Esc zum Beenden, Space=pause, etc.)
